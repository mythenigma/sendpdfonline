<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" font-family="Arial, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="280" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="0" y="0" width="820" height="44" fill="url(#headerGrad)"/>
  <text x="410" y="28" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Replace PDF in 3 steps</text>

  <!-- Step 1 -->
  <g transform="translate(24, 64)">
    <rect width="220" height="192" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <rect width="220" height="36" rx="12" fill="#e0e7ff"/>
    <rect x="0" y="24" width="220" height="12" fill="#e0e7ff"/>
    <text x="110" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">1. Share</text>
    <text x="110" y="82" font-size="13" text-anchor="middle" fill="#475569">Upload PDF, get link</text>
    <text x="110" y="105" font-size="12" text-anchor="middle" fill="#94a3b8">Send link to clients</text>
    <text x="110" y="140" font-size="11" text-anchor="middle" fill="#64748b">maipdf.com/v/abc123</text>
  </g>

  <path d="M 256 160 L 296 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Step 2 -->
  <g transform="translate(300, 64)">
    <rect width="220" height="192" rx="12" fill="white" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <rect width="220" height="36" rx="12" fill="#d1fae5"/>
    <rect x="0" y="24" width="220" height="12" fill="#d1fae5"/>
    <text x="110" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#065f46">2. Replace</text>
    <text x="110" y="82" font-size="13" text-anchor="middle" fill="#475569">Need to update? Go to</text>
    <text x="110" y="105" font-size="12" text-anchor="middle" fill="#059669" font-weight="600">Replacement Portal</text>
    <text x="110" y="135" font-size="11" text-anchor="middle" fill="#64748b">Enter codes, upload new PDF</text>
    <text x="110" y="158" font-size="11" text-anchor="middle" fill="#10b981" font-weight="600">Same link stays</text>
  </g>

  <path d="M 532 160 L 572 160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

  <!-- Step 3 -->
  <g transform="translate(576, 64)">
    <rect width="220" height="192" rx="12" fill="white" stroke="#e2e8f0" stroke-width="2" filter="url(#shadow)"/>
    <rect width="220" height="36" rx="12" fill="#e0e7ff"/>
    <rect x="0" y="24" width="220" height="12" fill="#e0e7ff"/>
    <text x="110" y="24" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e40af">3. Done</text>
    <text x="110" y="82" font-size="13" text-anchor="middle" fill="#475569">Recipients open</text>
    <text x="110" y="105" font-size="12" text-anchor="middle" fill="#1e40af" font-weight="600">same link</text>
    <text x="110" y="140" font-size="11" text-anchor="middle" fill="#10b981">See new PDF</text>
  </g>

  <!-- Footer hint -->
  <text x="410" y="268" font-size="12" text-anchor="middle" fill="#94a3b8">No resend. Link unchanged.</text>
</svg>
