<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">Event Photo Sharing Runbook</title>
  <desc id="desc">Structured runbook for collecting, packaging, distributing, and measuring event image engagement.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#ea580c"/>
    </marker>
    <style>
      .title{font:700 33px Inter,Segoe UI,sans-serif;fill:#7c2d12}
      .sub{font:500 16px Inter,Segoe UI,sans-serif;fill:#9a3412}
      .card{fill:#ffffff;stroke:#fb923c;stroke-width:2}
      .h{font:700 21px Inter,Segoe UI,sans-serif;fill:#7c2d12}
      .t{font:400 15px Inter,Segoe UI,sans-serif;fill:#7c2d12}
      .line{stroke:#ea580c;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .chip{font:700 12px Inter,Segoe UI,sans-serif;fill:#b45309}
    </style>
  </defs>

  <rect width="1200" height="470" fill="url(#bg)"/>
  <text class="title" x="600" y="56" text-anchor="middle">Event-Day Photo Sharing Runbook</text>
  <text class="sub" x="600" y="82" text-anchor="middle">From capture to post-event follow-up in one operational lane</text>

  <g transform="translate(55,120)">
    <rect class="card" rx="14" ry="14" width="250" height="280"/>
    <text class="h" x="28" y="42">1) Collect</text>
    <text class="t" x="28" y="82">• Open the team upload channel</text>
    <text class="t" x="28" y="112">• Drop raw sets by time block</text>
    <text class="t" x="28" y="142">• Remove duplicates / blur fails</text>
    <text class="t" x="28" y="172">• Keep only campaign-ready cuts</text>
    <text class="chip" x="28" y="236">Output: clean input batch</text>
  </g>

  <g transform="translate(335,120)">
    <rect class="card" rx="14" ry="14" width="250" height="280"/>
    <text class="h" x="28" y="42">2) Package</text>
    <text class="t" x="28" y="82">• Group by session or audience</text>
    <text class="t" x="28" y="112">• Add a clear gallery title</text>
    <text class="t" x="28" y="142">• Configure open limits if needed</text>
    <text class="t" x="28" y="172">• Generate link + QR output</text>
    <text class="chip" x="28" y="236">Output: delivery-ready gallery</text>
  </g>

  <g transform="translate(615,120)">
    <rect class="card" rx="14" ry="14" width="250" height="280"/>
    <text class="h" x="28" y="42">3) Distribute</text>
    <text class="t" x="28" y="82">• Link for email / social / chat</text>
    <text class="t" x="28" y="112">• QR for venue screens & cards</text>
    <text class="t" x="28" y="142">• Post once, then reminder cadence</text>
    <text class="t" x="28" y="172">• Keep one canonical URL</text>
    <text class="chip" x="28" y="236">Output: audience access at scale</text>
  </g>

  <g transform="translate(895,120)">
    <rect class="card" rx="14" ry="14" width="250" height="280"/>
    <text class="h" x="28" y="42">4) Measure</text>
    <text class="t" x="28" y="82">• Watch open spikes by channel</text>
    <text class="t" x="28" y="112">• Patch missed audience segments</text>
    <text class="t" x="28" y="142">• Revoke stale links after event</text>
    <text class="t" x="28" y="172">• Publish highlight recap</text>
    <text class="chip" x="28" y="236">Output: insights for next event</text>
  </g>

  <path class="line" d="M305 260 L335 260"/>
  <path class="line" d="M585 260 L615 260"/>
  <path class="line" d="M865 260 L895 260"/>
</svg>
