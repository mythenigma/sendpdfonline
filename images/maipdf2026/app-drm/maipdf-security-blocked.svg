<svg xmlns="http://www.w3.org/2000/svg" width="390" height="880" viewBox="0 0 390 880">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#f1f5f9"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.14"/></filter>
  </defs>
  <rect width="390" height="880" rx="36" fill="url(#bg)"/>
  <rect x="0" y="0" width="390" height="88" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <text x="24" y="54" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#0f172a">Protected Viewer</text>
  <rect x="26" y="118" width="338" height="560" rx="28" fill="#ffffff" filter="url(#shadow)"/>
  <circle cx="195" cy="244" r="56" fill="#fee2e2"/>
  <text x="195" y="263" text-anchor="middle" font-family="Arial, sans-serif" font-size="56" fill="#dc2626">!</text>
  <text x="195" y="334" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="850" fill="#0f172a">Protected document blocked</text>
  <text x="195" y="374" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">This environment looks risky.</text>
  <text x="195" y="398" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">MaiPDF can refuse to open protected files</text>
  <text x="195" y="422" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" fill="#64748b">when capture or tampering signals appear.</text>
  <rect x="54" y="468" width="282" height="54" rx="16" fill="#fef2f2" stroke="#fecaca"/>
  <text x="76" y="502" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#991b1b">Virtual machine / remote capture detected</text>
  <rect x="54" y="542" width="282" height="54" rx="16" fill="#fff7ed" stroke="#fed7aa"/>
  <text x="76" y="576" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#9a3412">Debugger or developer mode signal</text>
  <rect x="54" y="616" width="282" height="44" rx="14" fill="#7c3aed"/>
  <text x="195" y="644" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="850" fill="#ffffff">Close protected viewer</text>
  <rect x="26" y="708" width="338" height="112" rx="24" fill="#0f172a" filter="url(#shadow)"/>
  <text x="48" y="748" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="850" fill="#ffffff">App DRM is not just a file wrapper.</text>
  <text x="48" y="780" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">The app checks device integrity before</text>
  <text x="48" y="800" font-family="Inter, Arial, sans-serif" font-size="13" fill="#cbd5e1">rendering sensitive PDF content.</text>
</svg>
