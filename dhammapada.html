<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Dhammapada 章节学习页</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    :root{
      --bg:#f3eee3;
      --panel:#fbf7ef;
      --panel-soft:#f7f1e6;
      --line:#d8cebd;
      --line-strong:#b29d79;
      --text:#2f2a24;
      --muted:#7b7265;
      --muted-2:#5b5348;
      --blue:#6d7f73;
      --blue-deep:#6f6048;
      --green:#6f8a66;
      --yellow:#af7e1d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.65;
    }
    .page{
      max-width:1180px;
      margin:0 auto;
      padding:24px;
    }
    .hero{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:18px;
      background:linear-gradient(135deg,#faf5ea,#f3ecdf 58%,#ece3d3);
      border:1px solid var(--line);
      border-radius:18px;
      padding:24px 26px;
      box-shadow:0 16px 34px rgba(108,88,58,.08);
      margin-bottom:20px;
    }
    .hero-kicker{
      color:#7f6d4d;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    h1{
      margin:0;
      font-size:28px;
      line-height:1.15;
    }
    .hero-subtitle{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
    }
    .current-chip{
      flex:0 0 auto;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid #d3c4a8;
      background:#efe4cf;
      color:#5f5037;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }
    .hero-side{
      flex:0 0 420px;
      max-width:420px;
      display:flex;
      flex-direction:column;
      align-items:flex-start;
      gap:14px;
      padding-top:6px;
    }
    .chapter-note{
      color:var(--muted-2);
      font-size:15px;
      line-height:1.75;
    }
    .chapter-note strong{
      color:var(--text);
    }
    .chapter-shell{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
    }
    .chapter-nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      border-bottom:2px solid var(--line-strong);
      background:#f6efe2;
      padding:12px 14px;
      flex-wrap:wrap;
    }
    .chapter-tabs{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    .chapter-picker{
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:13px;
      font-weight:700;
    }
    .chapter-picker select{
      appearance:none;
      min-width:220px;
      padding:10px 36px 10px 12px;
      border-radius:12px;
      border:1px solid #cdbfa8;
      background:#fffaf1;
      color:var(--text);
      font-size:14px;
      font-weight:700;
      outline:none;
    }
    .chapter-picker select:focus{
      border-color:#a58d67;
      box-shadow:0 0 0 3px rgba(165,141,103,.14);
    }
    .chapter-btn{
      flex:0 0 auto;
      padding:10px 14px;
      background:transparent;
      color:var(--muted);
      border:1px solid transparent;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      border-radius:12px;
      transition:all .2s ease;
    }
    .chapter-btn:hover{
      background:#efe5d4;
      color:var(--text);
    }
    .chapter-btn.active{
      background:var(--blue-deep);
      color:#fff;
      border-color:var(--blue-deep);
    }
    .chapter-more{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      padding:0 4px;
    }
    .chapter-panel{
      display:none;
      padding:26px;
    }
    .chapter-panel.active{
      display:block;
    }
    .chapter-panel-immersive{
      padding:0;
    }
    .chapter-placeholder{
      background:linear-gradient(135deg,#f8f2e7,#f2eadc);
      border:1px solid var(--line);
      border-radius:16px;
      padding:22px;
      color:var(--muted-2);
    }
    .chapter-placeholder h3{
      margin:0 0 10px;
      color:var(--text);
      font-size:20px;
    }
    .status-note{
      background:#f6f0e5;
      border:1px solid var(--line);
      border-radius:12px;
      padding:14px 16px;
      color:var(--muted-2);
      min-width:220px;
    }
    .status-note strong{
      color:var(--text);
      display:block;
      margin-bottom:4px;
    }
    .placeholder-tag{
      display:inline-block;
      padding:4px 10px;
      border-radius:999px;
      background:#e4ecdf;
      color:#53674f;
      font-size:12px;
      font-weight:700;
      margin-bottom:12px;
    }
    .tab-shell{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      overflow:hidden;
    }
    .chapter-panel-immersive .tab-shell{
      background:transparent;
      border:none;
      border-radius:0;
      overflow:visible;
    }
    .tab-nav{
      display:flex;
      gap:0;
      border-bottom:2px solid var(--line-strong);
      overflow:auto;
      scrollbar-width:thin;
      background:#f6efe2;
      padding:0 8px;
    }
    .chapter-panel-immersive .tab-nav{
      padding:0 26px;
      background:transparent;
    }
    .tab-btn{
      flex:0 0 auto;
      padding:12px 18px;
      background:transparent;
      color:var(--muted);
      border:1px solid transparent;
      border-bottom:none;
      cursor:pointer;
      font-size:14px;
      font-weight:700;
      border-radius:10px 10px 0 0;
      transition:all .2s ease;
      margin-top:8px;
    }
    .tab-btn:hover{
      background:#efe5d4;
      color:var(--text);
    }
    .tab-btn.active{
      background:var(--blue-deep);
      color:#fffdf9;
      border-color:var(--blue-deep);
    }
    .tab-panel{
      display:none;
      padding:26px;
    }
    .tab-panel.active{
      display:block;
    }
    .chapter-panel-immersive .tab-panel{
      padding:22px 26px 30px;
    }
    .panel-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:16px;
      margin-bottom:18px;
      flex-wrap:wrap;
    }
    .verse-badge{
      display:inline-block;
      padding:5px 10px;
      border-radius:999px;
      background:#e8dfcf;
      color:#6a5a42;
      font-size:12px;
      font-weight:700;
      margin-bottom:8px;
    }
    .panel-head h2{
      margin:0;
      font-size:24px;
    }
    .panel-head p{
      margin:6px 0 0;
      color:var(--muted);
    }
    .nav-actions{
      display:flex;
      gap:10px;
      align-items:center;
    }
    .nav-actions button{
      background:#efe5d4;
      color:var(--text);
      border:1px solid #cfbea2;
      border-radius:10px;
      padding:10px 14px;
      cursor:pointer;
      font-weight:700;
      transition:background .2s ease;
    }
    .nav-actions button:hover{
      background:#e2d5bf;
    }
    .reading-panel{
      margin-bottom:22px;
      border-top:1px solid var(--line);
      border-bottom:1px solid var(--line);
    }
    .reading-section{
      padding:18px 0;
    }
    .reading-section + .reading-section{
      border-top:1px solid var(--line);
    }
    .section-label{
      display:block;
      margin:0 0 12px;
      color:var(--blue);
      font-size:17px;
      font-weight:700;
    }
    .content-panel{
      padding-top:4px;
    }
    .card-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:12px;
    }
    .card-head h3{
      margin:0;
    }
    .speech-tools{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .speech-tools button,
    .speech-tools select{
      border-radius:10px;
      border:1px solid #cdbfa8;
      background:#fffaf1;
      color:var(--text);
      font-size:13px;
    }
    .speech-tools button{
      padding:8px 12px;
      cursor:pointer;
      font-weight:700;
    }
    .speech-tools button:hover{
      background:#efe5d4;
    }
    .speech-tools button.is-speaking{
      background:#7f6d4d;
      border-color:#7f6d4d;
      color:#fffdf9;
    }
    .speech-tools select{
      padding:8px 10px;
      min-width:110px;
      outline:none;
    }
    .speech-tools select:focus{
      border-color:#a58d67;
      box-shadow:0 0 0 3px rgba(165,141,103,.14);
    }
    .speech-note{
      margin-top:10px;
      color:var(--muted);
      font-size:12px;
    }
    .english{
      font-size:20px;
      color:var(--text);
      margin:0;
    }
    .translation{
      font-size:18px;
      color:var(--muted-2);
      margin:0;
    }
    .gloss{
      background:transparent;
      border:none;
      border-left:3px solid #b39b72;
      padding:2px 0 2px 14px;
      margin-top:14px;
      color:var(--muted-2);
    }
    .gloss strong{
      color:var(--text);
    }
    .vocab-list{
      display:block;
      margin-top:14px;
    }
    .vocab-item{
      background:transparent;
      border:none;
      border-bottom:1px solid var(--line);
      border-radius:0;
      padding:16px 0;
    }
    .vocab-item:last-child{border-bottom:none;padding-bottom:0}
    .vocab-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:2px;
    }
    .vocab-item .word{
      font-size:18px;
      font-weight:800;
      color:var(--text);
    }
    .vocab-item .pos{
      color:#7b6a52;
      font-size:12px;
      font-weight:700;
      margin-left:8px;
      text-transform:uppercase;
    }
    .speak-word-btn{
      flex:0 0 auto;
      padding:6px 10px;
      border-radius:10px;
      border:1px solid #cdbfa8;
      background:#fffaf1;
      color:var(--text);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }
    .speak-word-btn:hover{
      background:#efe5d4;
    }
    .speak-word-btn.is-speaking{
      background:#7f6d4d;
      border-color:#7f6d4d;
      color:#fffdf9;
    }
    .vocab-item p{
      margin:8px 0 0;
      color:var(--muted-2);
      font-size:14px;
    }
    .vocab-copy{
      margin-top:10px;
    }
    .vocab-line{
      margin:8px 0 0;
      color:var(--muted-2);
      font-size:15px;
      line-height:1.75;
    }
    .vocab-line strong{
      color:var(--text);
    }
    .use-line{
      margin-top:10px;
      padding-top:0;
      border-top:none;
      color:var(--muted-2);
      font-size:14px;
    }
    .use-line strong{
      color:var(--yellow);
    }
    .footer-note{
      margin-top:22px;
      color:var(--muted);
      font-size:13px;
    }
    @media (max-width: 820px){
      .page{padding:16px}
      .hero{
        padding:18px;
        align-items:flex-start;
        flex-direction:column;
      }
      .hero-side{
        flex:1 1 auto;
        max-width:none;
        width:100%;
      }
      h1{font-size:24px}
      .chapter-panel,.tab-panel{padding:18px}
      .chapter-panel-immersive{padding:0}
      .chapter-panel-immersive .tab-nav{padding:0 18px}
      .chapter-panel-immersive .tab-panel{padding:18px}
      .english,.translation{font-size:17px}
      .chapter-picker{
        width:100%;
      }
      .chapter-picker select{
        width:100%;
        min-width:0;
      }
      .speech-tools{
        justify-content:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div>
        <div class="hero-kicker">Dhammapada Reader</div>
        <h1>法句经学习页</h1>
        <div class="hero-subtitle">单页阅读 · 章节切换 · 课本式拆解</div>
      </div>
      <div class="hero-side">
        <div class="current-chip" id="current-chapter-chip">Chapter 1 · The Pairs</div>
        <div class="chapter-note" id="current-chapter-note"><strong>The Pairs</strong> 可以理解成“成对出现的对照”。这一章里很多句子都是两两相照着说，比如清净心和染污心、记恨和不记恨、重要和不重要，所以标题用 <strong>pairs</strong> 很贴切。</div>
      </div>
    </section>

    <section class="chapter-shell">
      <div class="chapter-nav" id="chapter-nav"></div>
      <div id="chapter-content"></div>
    </section>
  </div>

  <script>
    const chapters = [
      { id: 1, title: "The Pairs", done: true, note: "<strong>The Pairs</strong> 可以理解成“成对出现的对照”。这一章里很多句子都是两两相照着说，比如清净心和染污心、记恨和不记恨、重要和不重要，所以标题用 <strong>pairs</strong> 很贴切。" },
      { id: 2, title: "Heedfulness", done: false, note: "<strong>Heedfulness</strong> 不是普通的“小心”，而是带着警觉、留意、不放逸的意思。这个标题会抓住整章的修行重心。" },
      { id: 3, title: "The Mind", done: false, note: "<strong>The Mind</strong> 直接点出主题：这一章会把焦点放在心怎么动、怎么乱、又怎么被训练。" },
      { id: 4, title: "Flowers", done: false, note: "<strong>Flowers</strong> 这个标题听上去轻，但佛经里常借花做比喻，所以这里多半不是单讲花，而是借花说明人心和生命。" },
      { id: 5, title: "The Fool", done: false, note: "<strong>The Fool</strong> 里的 fool 不是随口骂人，更像佛经里说“看不清、执迷、不知轻重的人”。" },
      { id: 6, title: "The Wise Man", done: false, note: "<strong>The Wise Man</strong> 是和前面的 fool 形成对照，重点不只是聪明，而是有判断、有分寸、知道怎么活。" },
      { id: 7, title: "The Arahat", done: false, note: "这个标题里的 <strong>Arahat</strong> 是佛教专门术语，后面补这一章时，适合顺手把这个词本身也解释清楚。" },
      { id: 8, title: "The Thousands", done: false, note: "<strong>The Thousands</strong> 这个题目通常会带出数量很多和真正有价值之间的对比，不一定是在夸“多”。" },
      { id: 9, title: "Evil", done: false, note: "<strong>Evil</strong> 这里会比日常的“坏”更重一些，通常指会带来苦果的不善行为和心念。" },
      { id: 10, title: "Violence", done: false, note: "<strong>Violence</strong> 不只是动作上的暴力，也常会牵到伤害、敌对和以强压人的心。" },
      { id: 11, title: "Old Age", done: false, note: "<strong>Old Age</strong> 这个标题会把人带回生命无常、衰老和时间感，不只是生理年龄。" },
      { id: 12, title: "The Self", done: false, note: "<strong>The Self</strong> 听起来简单，但佛教语境里通常不只是“自己”，而会碰到更深一点的自我观问题。" },
      { id: 13, title: "The World", done: false, note: "<strong>The World</strong> 在佛经里往往不只是地理世界，也会包括人所执着、追逐和困住自己的整个经验世界。" },
      { id: 14, title: "The Buddha", done: false, note: "<strong>The Buddha</strong> 这一章名字很直白，重点大多会围绕佛陀的特质、境界或人应如何看待佛。" },
      { id: 15, title: "Happiness", done: false, note: "<strong>Happiness</strong> 在这里通常不会只讲轻松快乐，而会分辨什么是浅层快乐，什么是更稳的安乐。" },
      { id: 16, title: "Affection", done: false, note: "<strong>Affection</strong> 带有爱恋、牵挂、黏着的味道，后面很适合顺手解释它和 attachment 的差别。" },
      { id: 17, title: "Anger", done: false, note: "<strong>Anger</strong> 是很直接的题目，重点大概率会落在怒气如何伤人，也如何先烧到自己。" },
      { id: 18, title: "Impurity", done: false, note: "<strong>Impurity</strong> 在这本书里常不只是“脏”，而是心里的染污、不净和让人看不清的东西。" },
      { id: 19, title: "The Just", done: false, note: "<strong>The Just</strong> 里的 just 更接近公正、正直，不是 only 或 just now 那个常见意思。" },
      { id: 20, title: "The Path", done: false, note: "<strong>The Path</strong> 在佛教语境里通常不只是路，而是修行道路、实践方法和通往解脱的方向。" },
      { id: 21, title: "Miscellaneous", done: false, note: "<strong>Miscellaneous</strong> 就是“杂项、杂章”，表示这一章可能会收一些不容易归到单一主题的小组内容。" },
      { id: 22, title: "The State of Woe", done: false, note: "<strong>The State of Woe</strong> 听起来就比较重，woe 带有悲苦、不幸、凄惨的感觉。" },
      { id: 23, title: "The Elephant", done: false, note: "<strong>The Elephant</strong> 在佛经里常不是动物介绍，而是借大象做比喻，说明力量、忍耐或调伏。" },
      { id: 24, title: "Craving", done: false, note: "<strong>Craving</strong> 比普通的 want 更强，带有那种很抓、很黏、非要不可的欲求感。" },
      { id: 25, title: "The Monk", done: false, note: "<strong>The Monk</strong> 是讲修行人的一章，但重点通常不只在身份，而是在行为和内在状态。" },
      { id: 26, title: "The Holy Man", done: false, note: "<strong>The Holy Man</strong> 这个题目会让人想到“圣者”。后面补这一章时，很适合解释它和普通好人的区别。" }
    ];

    const verses = [
      {
        id: 1,
        title: "Mind leads everything",
        titleZh: "心走在一切前面",
        literalZh: "心先于一切心理状态；心是主导，它们都是由心所造。若一个人以染污之心说话或行动，痛苦就会跟着他，如同车轮跟着牛脚。",
        english: "Mind precedes all mental states. Mind is their chief; they are all mind-wrought. If with an impure mind a person speaks or acts, suffering follows him like the wheel that follows the foot of the ox.",
        chinese: "人的念头总是走在最前面，很多行为和状态，都是从心里先起的。要是一个人怀着不干净、不正的心去说话做事，痛苦就会跟着他，像牛车轮子紧跟着牛脚一样，躲不开。",
        takeaway: "这一句先把全章的基调定下来：不是先怪外界，而是先看自己的心。心歪了，后面的言语和行动也容易歪，结果自然就苦。佛经这里其实是在提醒人，很多后果不是突然掉下来的，而是从一个没被留意的念头慢慢长出来的。",
        example: "比如一个人本来只是对同事有点嫉妒，后来越想越不平衡，说话开始带刺，做事也故意不配合。最后关系变差、自己也天天憋闷。外面看像是人际问题，根子其实是最初那个不干净的念头。",
        vocab: [
          { word: "precede", pos: "verb", meaning: "在前面，先于某事发生。", usage: "一般用来表示时间或顺序上先发生。常见搭配：precede A, be preceded by B。例：A warning usually precedes a big change." },
          { word: "impure", pos: "adj", meaning: "不纯净的；这里引申为不正、被贪嗔痴污染的。", usage: "字面上可指不干净，抽象上也可指动机不纯。例：an impure intention。"},
          { word: "mind-wrought", pos: "adj", meaning: "由心造出来的，由内在心念形成的。", usage: "这是偏书面、宗教或哲学语境的词。可以理解成 shaped by the mind。"}
        ]
      },
      {
        id: 2,
        title: "A pure mind brings happiness",
        titleZh: "清净的心会带来快乐",
        literalZh: "心先于一切心理状态；心是主导，它们都是由心所造。若一个人以清净之心说话或行动，快乐就会跟着他，如同从不离身的影子。",
        english: "Mind precedes all mental states. Mind is their chief; they are all mind-wrought. If with a pure mind a person speaks or acts, happiness follows him like his never-departing shadow.",

    const chapterNav = document.getElementById("chapter-nav");
    const chapterContent = document.getElementById("chapter-content");
    const currentChapterChip = document.getElementById("current-chapter-chip");
    const currentChapterNote = document.getElementById("current-chapter-note");
    const chapterStorageKey = "dhammapada-active-chapter";
    const verseStorageKey = "dhammapada-the-pairs-active-tab";
    const ttsVoiceStorageKey = "dhammapada-tts-voice";
    const ttsRateStorageKey = "dhammapada-tts-rate";
    const visibleChapterCount = 6;
    const supportsSpeech = "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    let availableVoices = [];
    let activeSpeechKey = null;

    function escapeHtml(text){
      return String(text).replace(/[&<>"']/g, function(ch){
        return {
          "&":"&amp;",
          "<":"&lt;",
          ">":"&gt;",
          "\"":"&quot;",
          "'":"&#39;"
        }[ch];
      });
    }

    function getStoredRate(){
      const raw = localStorage.getItem(ttsRateStorageKey);
      return raw || "1";
    }

    function getStoredVoice(){
      return localStorage.getItem(ttsVoiceStorageKey) || "";
    }

    function pickDefaultVoice(){
      const stored = getStoredVoice();
      if(stored && availableVoices.some(function(voice){ return voice.name === stored; })){
        return stored;
      }
      const preferred = availableVoices.find(function(voice){
        return /^en/i.test(voice.lang) && /google|aria|zira|david|samantha|serena|mark|jenny/i.test(voice.name);
      }) || availableVoices.find(function(voice){
        return /^en/i.test(voice.lang);
      }) || availableVoices[0];
      return preferred ? preferred.name : "";
    }

    function populateVoiceSelects(){
      const selects = document.querySelectorAll(".voice-select");
      const selectedVoice = pickDefaultVoice();
      selects.forEach(function(select){
        const current = selectedVoice;
        const options = availableVoices.map(function(voice){
          const selected = voice.name === current ? " selected" : "";
          return '<option value="' + escapeHtml(voice.name) + '"' + selected + '>' +
            escapeHtml(voice.name + " · " + voice.lang) +
          '</option>';
        }).join("");
        select.innerHTML = options || '<option value="">默认声音</option>';
      });
      if(selectedVoice){
        try{
          localStorage.setItem(ttsVoiceStorageKey, selectedVoice);
        }catch(e){}
      }
    }

    function syncRateSelects(){
      const rate = getStoredRate();
      document.querySelectorAll(".rate-select").forEach(function(select){
        select.value = rate;
      });
    }

    function bindSpeechControls(){
      document.querySelectorAll(".voice-select").forEach(function(select){
        select.addEventListener("change", function(){
          try{
            localStorage.setItem(ttsVoiceStorageKey, select.value);
          }catch(e){}
          document.querySelectorAll(".voice-select").forEach(function(other){
            other.value = select.value;
          });
        });
      });
      document.querySelectorAll(".rate-select").forEach(function(select){
        select.addEventListener("change", function(){
          try{
            localStorage.setItem(ttsRateStorageKey, select.value);
          }catch(e){}
          document.querySelectorAll(".rate-select").forEach(function(other){
            other.value = select.value;
          });
        });
      });
      populateVoiceSelects();
      syncRateSelects();
      updateSpeakButtons();
    }

    function loadVoices(){
      if(!supportsSpeech) return;
      availableVoices = window.speechSynthesis.getVoices().filter(function(voice){
        return /^en/i.test(voice.lang) || /en/i.test(voice.name);
      });
      if(!availableVoices.length){
        availableVoices = window.speechSynthesis.getVoices();
      }
      populateVoiceSelects();
    }

    function updateSpeakButtons(){
      document.querySelectorAll(".speak-btn").forEach(function(btn){
        const isActive = btn.dataset.speechKey === activeSpeechKey;
        btn.classList.toggle("is-speaking", isActive);
        btn.textContent = isActive ? "正在朗读" : "朗读英文";
      });
      document.querySelectorAll(".speak-word-btn").forEach(function(btn){
        const isActive = btn.dataset.speechKey === activeSpeechKey;
        btn.classList.toggle("is-speaking", isActive);
        btn.textContent = isActive ? "朗读中" : "发音";
      });
    }

    function stopSpeaking(){
      if(!supportsSpeech) return;
      window.speechSynthesis.cancel();
      activeSpeechKey = null;
      updateSpeakButtons();
    }

    function speakText(text, speechKey){
      if(!supportsSpeech){
        window.alert("当前浏览器不支持语音朗读。可以换用最新版 Chrome、Edge 或 Safari 试试。");
        return;
      }
      if(!text) return;

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const selectedVoice = getStoredVoice();
      const voice = availableVoices.find(function(item){ return item.name === selectedVoice; }) || availableVoices[0];
      if(voice) utterance.voice = voice;
      utterance.lang = voice && voice.lang ? voice.lang : "en-US";
      utterance.rate = Number(getStoredRate() || 1);
      utterance.pitch = 1;

      utterance.onstart = function(){
        activeSpeechKey = speechKey;
        updateSpeakButtons();
      };
      utterance.onend = function(){
        activeSpeechKey = null;
        updateSpeakButtons();
      };
      utterance.onerror = function(){
        activeSpeechKey = null;
        updateSpeakButtons();
      };

      window.speechSynthesis.speak(utterance);
    }

    function speakVerse(id){
      const verse = verses.find(function(item){ return item.id === id; });
      if(!verse) return;
      speakText(verse.english, "verse-" + id);
    }

    function speakWord(word, verseId, vocabIndex){
      speakText(word, "word-" + verseId + "-" + vocabIndex);
    }

    function splitUsageParts(usage){
      const raw = String(usage || "").trim();
      const match = raw.match(/^(.*?)(?:例[:：]\s*)(.+)$/);
      if(match){
        return {
          main: match[1].replace(/[，、；;。\s]+$/,"").trim(),
          example: match[2].trim()
        };
      }
      return { main: raw, example: "" };
    }

    function buildFriendlyMeaning(vocab){
      const meaning = String(vocab.meaning || "").trim().replace(/[。]+$/,"");
      return "你可以先把 " + vocab.word + " 理解成“" + meaning + "”。";
    }

    function buildContextHint(vocab){
      const meaning = String(vocab.meaning || "").trim();
      if(meaning.indexOf("这里") !== -1){
        const fromHere = meaning.slice(meaning.indexOf("这里")).replace(/[。]+$/,"");
        return "放回这一句里，" + fromHere + "。";
      }
      if(vocab.pos === "verb"){
        return "放回这一句里，它更像是在推动一个动作或结果发生，所以记住“谁在前、谁在后”会更容易。";
      }
      if(vocab.pos === "adj"){
        return "放回这一句里，它是在描述一种状态或性质。读的时候可以先抓住它是在“形容什么”。";
      }
      if(vocab.pos === "noun"){
        return "放回这一句里，它更像一个概念名词。先抓核心意思，再看它和前后词怎么搭。";
      }
      if(vocab.pos === "phrase"){
        return "放回这一句里，最好把它整块看，不要拆得太碎。短语通常是一起记，理解会更顺。";
      }
      return "放回这一句里，先抓它的大方向意思，不用一开始就把每个细节都抠得很死。";
    }

    function buildPosTip(vocab){
      if(vocab.pos === "verb"){
        return "这是动词。背的时候别只背中文，顺手记一下它后面常接什么，会更实用。";
      }
      if(vocab.pos === "adj"){
        return "这是形容词。你可以顺手观察它是在名词前，还是放在 be 动词后面。";
      }
      if(vocab.pos === "noun"){
        return "这是名词。名词最值得一起记的是常见搭配，而不只是一个中文意思。";
      }
      if(vocab.pos === "phrase"){
        return "这是短语。短语最好整块记，拆开背往往会明白每个词，却抓不住整句感觉。";
      }
      return "先把核心意思抓住就够了，后面多看几次，自然会越来越熟。";
    }

    function renderVerseTabs(){
      const tabNav = document.getElementById("tab-nav");
      const tabContent = document.getElementById("tab-content");
      if(!tabNav || !tabContent) return;

      tabNav.innerHTML = verses.map(function(item, index){
        return '<button class="tab-btn' + (index === 0 ? ' active' : '') + '" data-target="tab-' + item.id + '">' +
          'Verse ' + item.id + "</button>";
      }).join("");

      tabContent.innerHTML = verses.map(function(item, index){
        const vocabHtml = item.vocab.map(function(v, vocabIndex){
          const usageParts = splitUsageParts(v.usage);
          return '<div class="vocab-item">' +
            '<div class="vocab-head">' +
              '<div><span class="word">' + escapeHtml(v.word) + '</span><span class="pos">' + escapeHtml(v.pos) + '</span></div>' +
              '<button type="button" class="speak-word-btn" data-speech-key="word-' + item.id + '-' + vocabIndex + '" data-word="' + escapeHtml(v.word) + '" data-verse="' + item.id + '" data-vocab-index="' + vocabIndex + '">发音</button>' +
            '</div>' +
            '<div class="vocab-copy">' +
              '<p class="vocab-line"><strong>先这样记：</strong>' + escapeHtml(buildFriendlyMeaning(v)) + '</p>' +
              '<p class="vocab-line"><strong>放回这句里：</strong>' + escapeHtml(buildContextHint(v)) + '</p>' +
              '<p class="vocab-line"><strong>一般怎么用：</strong>' + escapeHtml(usageParts.main) + '</p>' +
              (usageParts.example ? '<p class="vocab-line"><strong>你可以这样感受：</strong>' + escapeHtml(usageParts.example) + '</p>' : '') +
              '<p class="vocab-line"><strong>小提醒：</strong>' + escapeHtml(buildPosTip(v)) + '</p>' +
            '</div>' +
          '</div>';
        }).join("");

        return '<div id="tab-' + item.id + '" class="tab-panel' + (index === 0 ? ' active' : '') + '">' +
          '<div class="panel-head">' +
            '<div>' +
              '<div class="verse-badge">The Pairs · Verse ' + item.id + '</div>' +
              '<h2>' + escapeHtml(item.title) + '</h2>' +
              '<p>' + escapeHtml(item.titleZh || "") + '</p>' +
            '</div>' +
            '<div class="nav-actions">' +
              '<button type="button" onclick="goVerse(' + Math.max(1, item.id - 1) + ')">上一句</button>' +
              '<button type="button" onclick="goVerse(' + Math.min(verses.length, item.id + 1) + ')">下一句</button>' +
            '</div>' +
          '</div>' +
          '<div class="reading-panel">' +
            '<div class="reading-section">' +
              '<div class="card-head">' +
                '<span class="section-label">英文原句</span>' +
                '<div class="speech-tools">' +
                  '<button type="button" class="speak-btn" data-speech-key="verse-' + item.id + '" data-verse="' + item.id + '" onclick="speakVerse(' + item.id + ')">朗读英文</button>' +
                  '<button type="button" onclick="stopSpeaking()">停止</button>' +
                  '<select class="voice-select" aria-label="选择声音"></select>' +
                  '<select class="rate-select" aria-label="选择语速">' +
                    '<option value="0.85">慢一点</option>' +
                    '<option value="1" selected>正常</option>' +
                    '<option value="1.15">稍快</option>' +
                    '<option value="1.3">快一点</option>' +
                  '</select>' +
                '</div>' +
              '</div>' +
              '<p class="english">' + escapeHtml(item.english) + '</p>' +
              '<div class="speech-note">' + escapeHtml(item.literalZh || "") + '</div>' +
            '</div>' +
            '<div class="reading-section">' +
              '<span class="section-label">中文白话</span>' +
              '<p class="translation">' + escapeHtml(item.chinese) + '</p>' +
            '</div>' +
          '</div>' +
          '<div class="content-panel">' +
            '<span class="section-label">这句在说什么</span>' +
            '<div class="gloss"><strong>展开理解：</strong>' + escapeHtml(item.takeaway) + '</div>' +
            '<div class="gloss"><strong>生活例子：</strong>' + escapeHtml(item.example || "") + '</div>' +
            '<span class="section-label" style="margin-top:22px">本句生词</span>' +
            '<div class="vocab-list">' + vocabHtml + '</div>' +
            '<div class="footer-note">注：这里的中文不是逐字硬译，而是偏“读懂意思”的课本式白话解释。</div>' +
          '</div>' +
        '</div>';
      }).join("");

      bindSpeechControls();
    }

    function getVisibleChapters(activeId){
      const total = chapters.length;
      const half = Math.floor(visibleChapterCount / 2);
      let start = Math.max(1, activeId - half);
      let end = start + visibleChapterCount - 1;

      if(end > total){
        end = total;
        start = Math.max(1, end - visibleChapterCount + 1);
      }

      return chapters.filter(function(item){
        return item.id >= start && item.id <= end;
      });
    }

    function renderChapterNav(activeId){
      const visible = getVisibleChapters(activeId);
      const firstVisible = visible[0] ? visible[0].id : 1;
      const lastVisible = visible[visible.length - 1] ? visible[visible.length - 1].id : chapters.length;
      const leadingMore = firstVisible > 1 ? '<span class="chapter-more">...</span>' : '';
      const trailingMore = lastVisible < chapters.length ? '<span class="chapter-more">...</span>' : '';

      const tabsHtml = visible.map(function(item){
        return '<button class="chapter-btn' + (item.id === activeId ? ' active' : '') + '" data-chapter="' + item.id + '">' +
          item.id + '. ' + escapeHtml(item.title) +
        '</button>';
      }).join("");

      const selectHtml = chapters.map(function(item){
        return '<option value="' + item.id + '"' + (item.id === activeId ? ' selected' : '') + '>' +
          item.id + '. ' + escapeHtml(item.title) +
        '</option>';
      }).join("");

      chapterNav.innerHTML =
        '<div class="chapter-tabs">' + leadingMore + tabsHtml + trailingMore + '</div>' +
        '<label class="chapter-picker">跳到章节<select id="chapter-select">' + selectHtml + '</select></label>';
    }

    function renderChapters(){
      renderChapterNav(1);

      chapterContent.innerHTML = chapters.map(function(item, index){
        if(item.id === 1){
          return '<div id="chapter-' + item.id + '" class="chapter-panel chapter-panel-immersive' + (index === 0 ? ' active' : '') + '">' +
            '<section class="tab-shell">' +
              '<div class="tab-nav" id="tab-nav"></div>' +
              '<div id="tab-content"></div>' +
            '</section>' +
          '</div>';
        }

        return '<div id="chapter-' + item.id + '" class="chapter-panel' + (index === 0 ? ' active' : '') + '">' +
          '<div class="panel-head">' +
            '<div>' +
              '<div class="verse-badge">Chapter ' + item.id + '</div>' +
              '<h2>' + escapeHtml(item.title) + '</h2>' +
              '<p>这个章节的 tab 已经预留好，后面继续补内容时，还是写进这个同一个 HTML。</p>' +
            '</div>' +
            '<div class="status-note"><strong>当前状态</strong>占位已建好，内容待填充。</div>' +
          '</div>' +
          '<div class="chapter-placeholder">' +
            '<div class="placeholder-tag">Ready For Next Chapter</div>' +
            '<h3>' + escapeHtml(item.title) + '</h3>' +
            '<p>这个章节暂时先占位，不额外生成新页面。你下次只要说继续哪一章，我就直接把英文、中文白话和生词补进这个 tab 里。</p>' +
            '<p>预期结构会和 <code>The Pairs</code> 一样：英文原句、中文白话、生词解释、一般怎么用。</p>' +
          '</div>' +
        '</div>';
      }).join("");

      renderVerseTabs();
    }

    function activateVerse(id){
      document.querySelectorAll(".tab-btn").forEach(function(btn){
        btn.classList.toggle("active", btn.dataset.target === "tab-" + id);
      });
      document.querySelectorAll(".tab-panel").forEach(function(panel){
        panel.classList.toggle("active", panel.id === "tab-" + id);
      });
      try{
        localStorage.setItem(verseStorageKey, String(id));
      }catch(e){}
      const activeBtn = document.querySelector('.tab-btn[data-target="tab-' + id + '"]');
      if(activeBtn){
        activeBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
      }
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function activateChapter(id){
      stopSpeaking();
      renderChapterNav(id);
      document.querySelectorAll(".chapter-btn").forEach(function(btn){
        btn.classList.toggle("active", Number(btn.dataset.chapter) === id);
      });
      document.querySelectorAll(".chapter-panel").forEach(function(panel){
        panel.classList.toggle("active", panel.id === "chapter-" + id);
      });
      try{
        localStorage.setItem(chapterStorageKey, String(id));
      }catch(e){}
      const currentChapter = chapters.find(function(item){ return item.id === id; });
      if(currentChapterChip && currentChapter){
        currentChapterChip.textContent = "Chapter " + currentChapter.id + " · " + currentChapter.title;
      }
      if(currentChapterNote && currentChapter){
        currentChapterNote.innerHTML = currentChapter.note || "";
      }
      if(id === 1){
        const savedVerse = Number(localStorage.getItem(verseStorageKey) || 1);
        activateVerse(savedVerse >= 1 && savedVerse <= verses.length ? savedVerse : 1);
      } else {
        window.scrollTo({ top: 0, behavior: "smooth" });
      }
    }

    function goVerse(id){
      activateVerse(id);
    }

    renderChapters();

    chapterNav.addEventListener("click", function(event){
      const btn = event.target.closest(".chapter-btn");
      if(!btn) return;
      activateChapter(Number(btn.dataset.chapter));
    });

    chapterNav.addEventListener("change", function(event){
      if(event.target && event.target.id === "chapter-select"){
        activateChapter(Number(event.target.value));
      }
    });

    document.addEventListener("click", function(event){
      const btn = event.target.closest(".tab-btn");
      if(!btn) return;
      const targetId = Number(btn.dataset.target.replace("tab-", ""));
      activateVerse(targetId);
    });

    document.addEventListener("click", function(event){
      const btn = event.target.closest(".speak-word-btn");
      if(!btn) return;
      speakWord(btn.dataset.word, Number(btn.dataset.verse), Number(btn.dataset.vocabIndex));
    });

    document.addEventListener("keydown", function(event){
      const activeChapter = document.querySelector(".chapter-panel.active");
      if(!activeChapter || activeChapter.id !== "chapter-1") return;
      const active = document.querySelector(".tab-panel.active");
      if(!active) return;
      const current = Number(active.id.replace("tab-", ""));
      if(event.key === "ArrowRight" && current < verses.length) activateVerse(current + 1);
      if(event.key === "ArrowLeft" && current > 1) activateVerse(current - 1);
    });

    if(supportsSpeech){
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    window.speakVerse = speakVerse;
    window.speakWord = speakWord;
    window.stopSpeaking = stopSpeaking;

    const savedChapter = Number(localStorage.getItem(chapterStorageKey) || 1);
    activateChapter(savedChapter >= 1 && savedChapter <= chapters.length ? savedChapter : 1);
  </script>
</body>
</html>
