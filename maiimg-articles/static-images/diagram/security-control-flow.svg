<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="title desc">
  <title id="title">Security control flow for image sharing</title>
  <desc id="desc">Step-by-step flow: set limits, set expiration, distribute links, monitor and revoke access.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#059669"/>
    </marker>
    <style>
      .title{font:700 32px Inter,Segoe UI,sans-serif;fill:#14532d}
      .sub{font:500 16px Inter,Segoe UI,sans-serif;fill:#166534}
      .box{fill:#ffffff;stroke:#86efac;stroke-width:2}
      .h{font:700 20px Inter,Segoe UI,sans-serif;fill:#14532d}
      .t{font:400 14px Inter,Segoe UI,sans-serif;fill:#334155}
      .line{stroke:#10b981;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .chip{font:700 12px Inter,Segoe UI,sans-serif;fill:#047857}
    </style>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <text class="title" x="600" y="58" text-anchor="middle">Security Control Flow</text>
  <text class="sub" x="600" y="84" text-anchor="middle">Apply controls before sharing, then monitor and revoke quickly if risk appears</text>

  <g transform="translate(45,120)">
    <rect class="box" rx="14" ry="14" width="255" height="230"/>
    <text class="h" x="24" y="40">1) Set Limits</text>
    <text class="t" x="24" y="74">• Views per link</text>
    <text class="t" x="24" y="100">• Audience scope planning</text>
    <text class="t" x="24" y="126">• Right-size access for each batch</text>
    <text class="chip" x="24" y="192">Control: bounded opens</text>
  </g>

  <g transform="translate(335,120)">
    <rect class="box" rx="14" ry="14" width="255" height="230"/>
    <text class="h" x="24" y="40">2) Set Expiry</text>
    <text class="t" x="24" y="74">• Time-bound gallery windows</text>
    <text class="t" x="24" y="100">• Event / campaign end cut-off</text>
    <text class="t" x="24" y="126">• Auto close for stale links</text>
    <text class="chip" x="24" y="192">Control: time gate</text>
  </g>

  <g transform="translate(625,120)">
    <rect class="box" rx="14" ry="14" width="255" height="230"/>
    <text class="h" x="24" y="40">3) Share + Observe</text>
    <text class="t" x="24" y="74">• Distribute via link and QR</text>
    <text class="t" x="24" y="100">• Watch open trend in dashboard</text>
    <text class="t" x="24" y="126">• Spot unusual spikes quickly</text>
    <text class="chip" x="24" y="192">Control: visibility</text>
  </g>

  <g transform="translate(915,120)">
    <rect class="box" rx="14" ry="14" width="240" height="230"/>
    <text class="h" x="24" y="40">4) Revoke</text>
    <text class="t" x="24" y="74">• One-click disable</text>
    <text class="t" x="24" y="100">• Stop further access</text>
    <text class="t" x="24" y="126">• Reissue clean replacement link</text>
    <text class="chip" x="24" y="192">Control: fast recovery</text>
  </g>

  <path class="line" d="M300 235 L335 235"/>
  <path class="line" d="M590 235 L625 235"/>
  <path class="line" d="M880 235 L915 235"/>
</svg>