<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Jataka 故事学习页</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    :root{
      --bg:#f3eee3;
      --panel:#fbf7ef;
      --panel-soft:#f7f1e6;
      --line:#d8cebd;
      --line-strong:#b29d79;
      --text:#2f2a24;
      --muted:#7b7265;
      --muted-2:#5b5348;
      --accent:#6f6048;
      --accent-soft:#efe4cf;
      --green:#6f8a66;
      --gold:#af7e1d;
      --shadow:0 16px 34px rgba(108,88,58,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.68;
    }
    .page{
      max-width:1180px;
      margin:0 auto;
      padding:24px;
    }
    .hero{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:20px;
      background:linear-gradient(135deg,#faf5ea,#f3ecdf 58%,#ece3d3);
      border:1px solid var(--line);
      border-radius:20px;
      padding:26px 28px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
    }
    .hero-main{
      flex:1 1 420px;
      min-width:280px;
    }
    .hero-side{
      flex:0 0 430px;
      max-width:430px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .kicker{
      color:#7f6d4d;
      font-size:12px;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    h1{
      margin:0;
      font-size:34px;
      line-height:1.12;
    }
    .subtitle{
      margin-top:10px;
      font-size:15px;
      color:var(--muted);
    }
    .chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid #d3c4a8;
      background:var(--accent-soft);
      color:#5f5037;
      font-size:13px;
      font-weight:700;
    }
    .hero-nav,.section-nav,.story-nav{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .hero-btn,.section-btn,.story-btn{
      border:1px solid #d3c4a8;
      background:#f8f0e1;
      color:#6c5b40;
      cursor:pointer;
      transition:all .2s ease;
    }
    .hero-btn,.section-btn{
      padding:9px 14px;
      border-radius:999px;
      font-size:13px;
      font-weight:700;
    }
    .story-btn{
      padding:10px 12px;
      border-radius:10px;
      font-size:15px;
      font-weight:700;
      min-width:0;
      text-align:left;
    }
    .hero-btn:hover,.section-btn:hover,.story-btn:hover{
      background:#efe4cf;
      color:#4f412d;
    }
    .hero-btn.active,.section-btn.active,.story-btn.active{
      background:var(--accent);
      border-color:var(--accent);
      color:#fffdf9;
    }
    .hero-panel,.section-panel{
      display:none;
    }
    .hero-panel.active,.section-panel.active{
      display:block;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
    }
    .section-shell{
      overflow:hidden;
      margin-bottom:20px;
    }
    .section-header{
      padding:18px 22px;
      border-bottom:1px solid var(--line);
      background:#f7efdf;
    }
    .section-body{
      padding:22px;
    }
    .current-focus{
      margin-bottom:12px;
    }
    .hero-copy{
      color:var(--muted-2);
      font-size:15px;
    }
    .meta-grid{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:14px;
      margin-top:16px;
    }
    .meta-card{
      background:rgba(255,251,243,.72);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
    }
    .meta-label{
      color:#8a7653;
      font-size:12px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
      margin-bottom:8px;
    }
    .meta-value{
      font-size:25px;
      font-weight:800;
      line-height:1.18;
    }
    .meta-note{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
    }
    .story-browser{
      display:grid;
      grid-template-columns:210px minmax(0,1fr);
      gap:16px;
      align-items:start;
    }
    .story-nav{
      flex-direction:column;
      position:sticky;
      top:20px;
      max-height:calc(100vh - 48px);
      overflow:auto;
      padding-right:4px;
      gap:8px;
    }
    .story-num{
      display:block;
      font-size:10px;
      font-weight:700;
      letter-spacing:.05em;
      opacity:.85;
      margin-bottom:2px;
      text-transform:uppercase;
    }
    .story-title{
      display:block;
      line-height:1.25;
    }
    .story-card{
      background:#fdf9f1;
      border:1px solid var(--line);
      border-radius:18px;
      padding:28px 30px;
      min-height:520px;
    }
    .story-head{
      display:flex;
      flex-wrap:wrap;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      margin-bottom:18px;
    }
    .story-head h2{
      margin:8px 0 0;
      font-size:40px;
      line-height:1.12;
    }
    .story-head p{
      margin:10px 0 0;
      color:var(--muted);
      font-size:18px;
    }
    .story-badges{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:flex-end;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:#efe4cf;
      border:1px solid #d5c4a5;
      color:#5a4b32;
      font-size:13px;
      font-weight:700;
      white-space:nowrap;
    }
    .story-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }
    .story-block{
      background:#faf4e8;
      border:1px solid #e3d7c4;
      border-radius:16px;
      padding:18px;
    }
    .story-block.full{
      grid-column:1 / -1;
    }
    .story-block h3{
      margin:0 0 10px;
      font-size:18px;
      color:var(--green);
    }
    .story-block-header{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:10px;
    }
    .story-block-header h3{
      margin:0;
    }
    .story-block p{
      margin:0;
      color:var(--muted-2);
      font-size:16px;
    }
    .story-block p + p{
      margin-top:10px;
    }
    .scene-list{
      margin:0;
      padding-left:18px;
      color:var(--muted-2);
      font-size:15px;
    }
    .scene-list li + li{
      margin-top:8px;
    }
    .original-text{
      margin:0;
      color:#3c342c;
      font-size:15px;
      line-height:1.82;
      white-space:pre-line;
    }
    .vocab-list{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .vocab-item{
      background:#fffaf1;
      border:1px solid #e2d6c1;
      border-radius:14px;
      padding:14px 15px;
    }
    .vocab-head{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:baseline;
      justify-content:space-between;
      margin-bottom:8px;
    }
    .vocab-title{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:baseline;
    }
    .vocab-term{
      font-size:22px;
      font-weight:800;
      color:#2f2a24;
      line-height:1.15;
    }
    .vocab-pos{
      color:#8a7653;
      font-size:12px;
      font-weight:700;
      text-transform:lowercase;
      letter-spacing:.04em;
    }
    .vocab-lines{
      display:grid;
      gap:8px;
    }
    .vocab-line{
      color:var(--muted-2);
      font-size:14px;
      line-height:1.72;
    }
    .vocab-line strong{
      color:#3b3329;
    }
    .speech-controls{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
    }
    .speech-controls button,
    .speech-controls select{
      border:1px solid #ccb994;
      border-radius:12px;
      background:#fffaf1;
      color:#4f412d;
      font-size:15px;
      min-height:42px;
    }
    .speech-controls button{
      padding:0 16px;
      font-weight:700;
      cursor:pointer;
    }
    .speech-controls button:hover,
    .speech-controls select:hover{
      background:#f3e8d7;
    }
    .speech-controls button.is-speaking{
      background:var(--accent);
      border-color:var(--accent);
      color:#fffdf9;
    }
    .speech-controls select{
      padding:0 12px;
      min-width:220px;
    }
    .study-tabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:16px;
      border-bottom:1px solid var(--line);
      padding-bottom:10px;
    }
    .study-tab-btn{
      border:1px solid #d3c4a8;
      background:#f8f0e1;
      color:#6c5b40;
      border-radius:999px;
      padding:8px 14px;
      font-size:13px;
      font-weight:700;
      cursor:pointer;
    }
    .study-tab-btn.active{
      background:var(--accent);
      border-color:var(--accent);
      color:#fffdf9;
    }
    .study-panel{
      display:none;
    }
    .study-panel.active{
      display:block;
    }
    .study-paragraph{
      padding:22px 0;
      border-bottom:1px solid #e1d4bf;
    }
    .study-paragraph:first-child{
      padding-top:0;
    }
    .study-paragraph:last-child{
      border-bottom:0;
      padding-bottom:0;
    }
    .study-label{
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      background:#efe4cf;
      color:#6c5b40;
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }
    .study-english{
      margin:0 0 12px;
      color:#2f2a24;
      font-size:24px;
      line-height:1.62;
    }
    .study-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:14px;
      margin-top:12px;
    }
    .study-note-box{
      border-left:4px solid #b29d79;
      background:#f8f1e5;
      border-radius:0 12px 12px 0;
      padding:12px 14px;
      color:var(--muted-2);
      font-size:17px;
      line-height:1.8;
    }
    .study-note-box strong{
      color:#3b3329;
    }
    .mini-vocab{
      display:flex;
      flex-direction:column;
      gap:10px;
      margin-top:14px;
    }
    .mini-vocab-item{
      background:#fffaf1;
      border:1px solid #e2d6c1;
      border-radius:12px;
      padding:12px 13px;
    }
    .mini-vocab-title{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:6px;
    }
    .mini-vocab-term{
      font-weight:800;
      color:#2f2a24;
      font-size:24px;
    }
    .mini-vocab-line{
      color:var(--muted-2);
      font-size:16px;
      line-height:1.7;
    }
    .mini-vocab-line strong{
      color:#3b3329;
    }
    .vocab-head .speak-btn{
      border:1px solid #ccb994;
      border-radius:12px;
      background:#fffaf1;
      color:#4f412d;
      font-size:14px;
      font-weight:700;
      min-height:36px;
      padding:0 13px;
      cursor:pointer;
    }
    .vocab-head .speak-btn:hover{
      background:#f3e8d7;
    }
    .vocab-head .speak-btn.is-speaking{
      background:var(--accent);
      border-color:var(--accent);
      color:#fffdf9;
    }
    .index-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
    }
    .index-card{
      background:#fbf7ef;
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px 18px;
    }
    .index-card h3{
      margin:0 0 10px;
      font-size:18px;
    }
    .index-card ul{
      margin:0;
      padding-left:18px;
      color:var(--muted-2);
      font-size:15px;
    }
    .index-card li + li{
      margin-top:8px;
    }
    .quiet-note{
      margin-top:14px;
      color:var(--muted);
      font-size:14px;
    }
    .placeholder{
      padding:22px;
      border:1px dashed #ccb994;
      border-radius:16px;
      background:#faf4e8;
      color:var(--muted-2);
      font-size:15px;
    }
    .icon-line{
      display:flex;
      align-items:flex-start;
      gap:12px;
      margin-bottom:14px;
    }
    .icon-dot{
      flex:0 0 34px;
      width:34px;
      height:34px;
      border-radius:12px;
      background:#e7dbc6;
      border:1px solid #ccb994;
      color:#5d4f39;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size:16px;
      font-weight:700;
    }
    .icon-line strong{
      display:block;
      margin-bottom:4px;
      font-size:16px;
    }
    @media (max-width:980px){
      .meta-grid,.story-grid,.index-grid,.story-browser,.vocab-list{
        grid-template-columns:1fr;
      }
      .study-row{
        grid-template-columns:1fr;
      }
      .story-nav{
        position:static;
        flex-direction:row;
        overflow:auto;
        padding-bottom:6px;
      }
      .story-btn{
        min-width:220px;
      }
      .hero-side{
        flex:1 1 100%;
        max-width:none;
      }
    }
    @media (max-width:640px){
      .page{
        padding:14px;
      }
      .hero,.section-header,.section-body,.story-card{
        padding-left:16px;
        padding-right:16px;
      }
      h1{
        font-size:28px;
      }
      .story-head h2{
        font-size:28px;
      }
      .story-btn{
        font-size:16px;
        min-width:180px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-main">
        <div class="kicker">Jataka Reader</div>
        <h1>本生故事学习页</h1>
        <div class="subtitle">单页阅读 · 故事切换 · 先做可读版，再继续往后补细节</div>
        <div class="meta-grid">
          <div class="meta-card">
            <div class="meta-label">Source</div>
            <div class="meta-value">Jataka.pdf</div>
            <div class="meta-note">当前依据项目里的 Borobudur Jataka 版本整理。</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">Current Scope</div>
            <div class="meta-value">前 10 则</div>
            <div class="meta-note">前 10 个故事已做成可读、可切换的学习结构。</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">Layout</div>
            <div class="meta-value">单网页</div>
            <div class="meta-note">不拆很多页面，后面继续往同一页里追加。</div>
          </div>
        </div>
      </div>
      <div class="hero-side">
        <div class="current-focus">
          <span class="chip">当前重点：Jataka Relief Stories · Top Row</span>
        </div>
        <div class="hero-nav" id="heroInfoNav"></div>
        <div id="heroInfoPanels"></div>
      </div>
    </section>

    <section class="panel section-shell">
      <div class="section-header">
        <div class="section-nav" id="sectionNav"></div>
      </div>
      <div class="section-body">
        <div id="sectionPanels"></div>
      </div>
    </section>
  </div>

  <script>
    const heroInfoStorageKey = "jataka-hero-info-tab";
    const sectionStorageKey = "jataka-section-tab";
    const storyStorageKey = "jataka-top-story-tab";
    const ttsVoiceStorageKey = "jataka-tts-voice";
    const ttsRateStorageKey = "jataka-tts-rate";
    const supportsSpeech = "speechSynthesis" in window && "SpeechSynthesisUtterance" in window;
    const studyTabStorageKey = "jataka-study-tab";
    let availableVoices = [];
    let activeSpeechKey = null;

    const heroInfoTabs = [
      {
        id: "what",
        label: "这是什么",
        html: `
          <div class="hero-panel" data-panel="what">
            <div class="hero-copy">
              <strong>Jataka</strong> 一般就是“本生故事”，讲的是佛陀过去生里作为菩萨时，怎样一点点把布施、忍辱、决心、慈悲这些德目练出来。<br><br>
              这本 PDF 还有一个很特别的角度：它不是单纯抄故事文本，而是把 <strong>Borobudur 浮雕</strong> 上的故事场景，一格一格对应出来看，所以它很适合做成“故事 + 场景”式阅读页。
            </div>
          </div>`
      },
      {
        id: "read",
        label: "怎么读",
        html: `
          <div class="hero-panel" data-panel="read">
            <div class="hero-copy">
              这页我先按一个比较顺手的阅读法来排：<br><br>
              先抓故事主轴，再看它强调哪一种德目，然后再顺着 panel range 去看场景推进。<br>
              这样读不会一开始就被 400 多页吓住，而是先把“这个故事到底在讲什么”抓稳。
            </div>
          </div>`
      },
      {
        id: "scope",
        label: "这一版做到哪",
        html: `
          <div class="hero-panel" data-panel="scope">
            <div class="hero-copy">
              这一版不是空壳页。现在已经先把 <strong>Top Row 前 10 则故事</strong> 做成可切换内容：<br><br>
              The Tigress、King of the Sibis、Gruel、The Head of a Guild、Aviṣahya、The Hare、Agastya、Maitrībala、Viśvantara、The Sacrifice。<br>
              每则里现在会区分 <strong>原书英文</strong> 和 <strong>中文整理</strong>，不再把印尼语放进主阅读页。后面可以继续按同一套格式，一则一则往下补。
            </div>
          </div>`
      }
    ];

    const topStories = [
      {
        id: "tigress",
        shortLabel: "1. The Tigress",
        number: "Story 1",
        english: "The Tigress",
        chinese: "母虎故事",
        range: "Panels 1-4",
        virtue: "Giving One's own Body",
        virtueCn: "布施自己的身体",
        parallel: "No Pali parallel noted",
        originalEnglish: `The Bodhisattva was born in a family of eminent brahmins, but soon renounced the world, and became a teacher, having many disciples. One day while out with his disciple Ajita he saw a tigress, who, ravaged by starvation, was contemplating eating her own offspring.

By a ruse the Bodhisattva sent off his disciple and threw himself down the chasm so the tigress can be saved from such an ignoble act, and that he may fulfil the perfection of giving, for the sake of attaining Awakening. (No Pāḷi parallel exists)

1. The Birth Ceremony of the Bodhisattva
The Bodhisattva sits on his mother's lap while the brahmin priests pour libations over his head. It appears the Bodhisattva's father is on the far right, holding gifts for the priests. Unfortunately the boy's head has been lost. Notice his left leg rests on a lotus cushion.`,
        summary: [
          "菩萨出生在显赫婆罗门家，后来出离世间，成了一位老师。有一天他和弟子 Ajita 外出，看见一只母虎因饥饿到极点，竟要吃自己的幼崽。",
          "菩萨设法先支开弟子，然后把自己投下山谷，宁愿舍身，也不愿让母虎造下那样的恶业；同时，他也借此圆满布施的修行。"
        ],
        why: "这则故事的力度很大，因为它把“布施”推到了极端版本：不是拿出剩余的东西，而是连自己都舍得给。它很适合作为进入 Jataka 世界的第一篇，因为一开头就把菩萨道的气质立住了。",
        scenes: [
          "1. Birth Ceremony: 菩萨坐在母亲膝上，婆罗门祭司为他灌顶祝福。",
          "2. Learns Dharma: 菩萨受学，画面里能看出老师、学生和书写工具。",
          "3. Sacrifices Himself: 同一小面板里可能放了两幕，一边是洞中与弟子相处，一边是准备舍身喂虎。",

      });
      localStorage.setItem(heroInfoStorageKey, id);
    }

    function renderSections() {
      const nav = document.getElementById("sectionNav");
      const panels = document.getElementById("sectionPanels");
      nav.innerHTML = sectionTabs.map((tab) => (
        `<button class="section-btn" data-section="${tab.id}">${tab.label}</button>`
      )).join("");
      panels.innerHTML = sectionTabs.map((tab) => tab.render()).join("");
      nav.querySelectorAll(".section-btn").forEach((btn) => {
        btn.addEventListener("click", () => activateSection(btn.dataset.section));
      });
      activateSection(localStorage.getItem(sectionStorageKey) || "top");
    }

    function activateSection(id) {
      document.querySelectorAll(".section-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.section === id);
      });
      document.querySelectorAll(".section-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.panel === id);
      });
      localStorage.setItem(sectionStorageKey, id);
      if (id === "top") {
        renderStoryBrowser();
      }
    }

    function renderStoryBrowser() {
      const nav = document.getElementById("storyNav");
      const card = document.getElementById("storyCard");
      if (!nav || !card) return;
      nav.innerHTML = topStories.map((story) => `
        <button class="story-btn" data-story="${story.id}">
          <span class="story-num">${story.number}</span>
          <span class="story-title">${story.english}</span>
        </button>
      `).join("");
      nav.querySelectorAll(".story-btn").forEach((btn) => {
        btn.addEventListener("click", () => activateStory(btn.dataset.story));
      });
      activateStory(localStorage.getItem(storyStorageKey) || topStories[0].id);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function getStoredRate() {
      return localStorage.getItem(ttsRateStorageKey) || "1";
    }

    function getStoredVoice() {
      return localStorage.getItem(ttsVoiceStorageKey) || "";
    }

    function pickDefaultVoice() {
      const stored = getStoredVoice();
      if (stored && availableVoices.some((voice) => voice.name === stored)) {
        return stored;
      }
      const preferred = availableVoices.find((voice) => (
        /^en/i.test(voice.lang) && /google|aria|zira|david|samantha|serena|mark|jenny|george/i.test(voice.name)
      )) || availableVoices.find((voice) => /^en/i.test(voice.lang)) || availableVoices[0];
      return preferred ? preferred.name : "";
    }

    function loadVoices() {
      if (!supportsSpeech) return;
      availableVoices = window.speechSynthesis.getVoices().filter((voice) => (
        /^en/i.test(voice.lang) || /en/i.test(voice.name)
      ));
      if (!availableVoices.length) {
        availableVoices = window.speechSynthesis.getVoices();
      }
      populateVoiceSelects();
      updateSpeakButtons();
    }

    function populateVoiceSelects() {
      const selects = document.querySelectorAll(".voice-select");
      const selectedVoice = pickDefaultVoice();
      selects.forEach((select) => {
        select.innerHTML = (availableVoices.map((voice) => {
          const selected = voice.name === selectedVoice ? " selected" : "";
          return `<option value="${voice.name.replace(/"/g, "&quot;")}"${selected}>${voice.name} · ${voice.lang}</option>`;
        }).join("")) || '<option value="">默认声音</option>';
      });
      if (selectedVoice) {
        localStorage.setItem(ttsVoiceStorageKey, selectedVoice);
      }
    }

    function syncRateSelects() {
      const rate = getStoredRate();
      document.querySelectorAll(".rate-select").forEach((select) => {
        select.value = rate;
      });
    }

    function updateSpeakButtons() {
      document.querySelectorAll(".speak-btn").forEach((btn) => {
        const isActive = btn.dataset.speechKey === activeSpeechKey;
        btn.classList.toggle("is-speaking", isActive);
        btn.textContent = isActive ? (btn.dataset.activeLabel || "正在朗读") : (btn.dataset.idleLabel || "朗读英文");
      });
    }

    function stopSpeaking() {
      if (!supportsSpeech) return;
      window.speechSynthesis.cancel();
      activeSpeechKey = null;
      updateSpeakButtons();
    }

    function speakText(text, speechKey) {
      if (!supportsSpeech) {
        window.alert("当前浏览器不支持语音朗读。可以换用最新版 Chrome、Edge 或 Safari 试试。");
        return;
      }
      if (!text) return;

      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      const selectedVoice = getStoredVoice();
      const voice = availableVoices.find((item) => item.name === selectedVoice) || availableVoices[0];
      if (voice) utterance.voice = voice;
      utterance.lang = voice && voice.lang ? voice.lang : "en-US";
      utterance.rate = Number(getStoredRate() || 1);
      utterance.pitch = 1;

      utterance.onstart = function() {
        activeSpeechKey = speechKey;
        updateSpeakButtons();
      };
      utterance.onend = function() {
        activeSpeechKey = null;
        updateSpeakButtons();
      };
      utterance.onerror = function() {
        activeSpeechKey = null;
        updateSpeakButtons();
      };
      window.speechSynthesis.speak(utterance);
    }

    function bindSpeechControls() {
      document.querySelectorAll(".speak-btn[data-speak-text]").forEach((button) => {
        button.addEventListener("click", function() {
          speakText(button.dataset.speakText, button.dataset.speechKey);
        });
      });
      document.querySelectorAll(".voice-select").forEach((select) => {
        select.addEventListener("change", function() {
          localStorage.setItem(ttsVoiceStorageKey, select.value);
          document.querySelectorAll(".voice-select").forEach((other) => {
            other.value = select.value;
          });
        });
      });
      document.querySelectorAll(".rate-select").forEach((select) => {
        select.addEventListener("change", function() {
          localStorage.setItem(ttsRateStorageKey, select.value);
          document.querySelectorAll(".rate-select").forEach((other) => {
            other.value = select.value;
          });
        });
      });
      populateVoiceSelects();
      syncRateSelects();
      updateSpeakButtons();
    }

    function renderParagraphVocab(story, paragraph) {
      if (!paragraph.vocab || !paragraph.vocab.length) return "";
      return `
        <div class="mini-vocab">
          ${paragraph.vocab.map((item) => `
            <div class="mini-vocab-item">
              <div class="mini-vocab-title">
                <span class="mini-vocab-term">${item.term} <span class="vocab-pos">${item.pos}</span></span>
                <button type="button" class="speak-btn" data-idle-label="发音" data-active-label="朗读中" data-speech-key="${escapeHtml(`mini-${story.id}-${paragraph.label}-${item.term}`)}" data-speak-text="${escapeHtml(item.term)}">发音</button>
              </div>
              <div class="mini-vocab-line"><strong>English：</strong>${item.english}</div>
              <div class="mini-vocab-line"><strong>中文：</strong>${item.chinese}</div>
              <div class="mini-vocab-line"><strong>Example：</strong>${item.example}</div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderStudyPanels(story) {
      if (!story.study) return "";
      return `
        <div class="story-block full">
          <div class="story-block-header">
            <h3>原书英文精读</h3>
            <div class="speech-controls">
              <button type="button" class="speak-btn" data-idle-label="朗读全文" data-active-label="正在朗读" data-speech-key="study-full-${story.id}" data-speak-text="${escapeHtml(story.originalEnglish)}">朗读全文</button>
              <button type="button" onclick="stopSpeaking()">停止</button>
              <select class="voice-select" aria-label="选择英文声音"></select>
              <select class="rate-select" aria-label="选择朗读速度">
                <option value="0.85">慢一点</option>
                <option value="1">正常</option>
                <option value="1.12">快一点</option>
              </select>
            </div>
          </div>
          <div class="study-tabs">
            ${story.study.tabs.map((tab) => `
              <button type="button" class="study-tab-btn" data-study-tab="${tab.id}">${tab.label}</button>
            `).join("")}
          </div>
          ${story.study.tabs.map((tab) => `
            <div class="study-panel" data-study-panel="${tab.id}">
              ${tab.paragraphs.map((paragraph, index) => `
                <div class="study-paragraph">
                  <div class="story-block-header">
                    <span class="study-label">${paragraph.label}</span>
                    <div class="speech-controls">
                      <button type="button" class="speak-btn" data-idle-label="读本段" data-active-label="朗读中" data-speech-key="${escapeHtml(`paragraph-${story.id}-${tab.id}-${index}`)}" data-speak-text="${escapeHtml(paragraph.english)}">读本段</button>
                    </div>
                  </div>
                  <p class="study-english">${paragraph.english}</p>
                  <div class="study-row">
                    <div class="study-note-box"><strong>直译：</strong>${paragraph.literalZh}</div>
                    <div class="study-note-box"><strong>白话：</strong>${paragraph.plainZh}</div>
                  </div>
                  <div class="study-note-box" style="margin-top:12px;"><strong>本段在说什么：</strong>${paragraph.note}</div>
                  ${renderParagraphVocab(story, paragraph)}
                </div>
              `).join("")}
            </div>
          `).join("")}
        </div>
      `;
    }

    function activateStudyTab(id) {
      const nextId = id || localStorage.getItem(studyTabStorageKey) || "text";
      document.querySelectorAll(".study-tab-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.studyTab === nextId);
      });
      document.querySelectorAll(".study-panel").forEach((panel) => {
        panel.classList.toggle("active", panel.dataset.studyPanel === nextId);
      });
      localStorage.setItem(studyTabStorageKey, nextId);
    }

    function bindStudyTabs(story) {
      if (!story.study) return;
      document.querySelectorAll(".study-tab-btn").forEach((btn) => {
        btn.addEventListener("click", function() {
          activateStudyTab(btn.dataset.studyTab);
        });
      });
      const saved = localStorage.getItem(studyTabStorageKey);
      const hasSaved = story.study.tabs.some((tab) => tab.id === saved);
      activateStudyTab(hasSaved ? saved : story.study.tabs[0].id);
    }

    function activateStory(id) {
      const story = topStories.find((item) => item.id === id) || topStories[0];
      document.querySelectorAll(".story-btn").forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.story === story.id);
      });
      const card = document.getElementById("storyCard");
      card.innerHTML = `
        <div class="story-head">
          <div>
            <span class="chip">${story.range}</span>
            <h2>${story.english}</h2>
            <p>${story.chinese} · ${story.virtueCn}</p>
          </div>
          <div class="story-badges">
            <span class="badge">${story.virtue}</span>
            <span class="badge">${story.parallel}</span>
          </div>
        </div>
        <div class="story-grid">
          ${story.study ? renderStudyPanels(story) : `
            <div class="story-block full">
            <div class="story-block-header">
              <h3>原书英文</h3>
              <div class="speech-controls">
                <button type="button" class="speak-btn" data-speech-key="story-${story.id}" data-speak-text="${escapeHtml(story.originalEnglish)}">朗读英文</button>
                <button type="button" onclick="stopSpeaking()">停止</button>
                <select class="voice-select" aria-label="选择英文声音"></select>
                <select class="rate-select" aria-label="选择朗读速度">
                  <option value="0.85">慢一点</option>
                  <option value="1">正常</option>
                  <option value="1.12">快一点</option>
                </select>
              </div>
            </div>
            <p class="original-text">${story.originalEnglish}</p>
          </div>`}
          <div class="story-block">
            <h3>故事主线</h3>
            ${story.summary.map((para) => `<p>${para}</p>`).join("")}
          </div>
          <div class="story-block">
            <h3>这一则为什么重要</h3>
            <p>${story.why}</p>
          </div>
          <div class="story-block full">
            <h3>场景推进</h3>
            <ol class="scene-list">
              ${story.scenes.map((scene) => `<li>${scene}</li>`).join("")}
            </ol>
          </div>
          <div class="story-block full">
            <h3>阅读提醒</h3>
            <p>${story.note}</p>
          </div>
          <div class="story-block full">
            <h3>难词短语</h3>
            <div class="vocab-list">
              ${story.vocab.map((item) => `
                <div class="vocab-item">
                  <div class="vocab-head">
                    <div class="vocab-title">
                      <span class="vocab-term">${item.term}</span>
                      <span class="vocab-pos">${item.pos}</span>
                    </div>
                    <button type="button" class="speak-btn" data-idle-label="发音" data-active-label="朗读中" data-speech-key="${escapeHtml(`word-${story.id}-${item.term}`)}" data-speak-text="${escapeHtml(item.term)}">发音</button>
                  </div>
                  <div class="vocab-lines">
                    <div class="vocab-line"><strong>中文：</strong>${item.chinese}</div>
                    <div class="vocab-line"><strong>English：</strong>${item.english}</div>
                    <div class="vocab-line"><strong>Example：</strong>${item.example}</div>
                  </div>
                </div>
              `).join("")}
            </div>
          </div>
        </div>
      `;
      bindSpeechControls();
      bindStudyTabs(story);
      localStorage.setItem(storyStorageKey, story.id);
    }

    window.speakText = speakText;
    window.stopSpeaking = stopSpeaking;

    if (supportsSpeech) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    renderHeroInfo();
    renderSections();
  </script>
</body>
</html>
